services:
  - type: web
    name: disease-outbreak-detection
    env: python
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn dashboard_server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    autoDeploy: true
