project:
  name: early_disease_outbreak_detection
  random_state: 42
data:
  source: web
  fallback_to_synthetic_on_web_failure: true
  raw_path: data/raw/surveillance_sample.csv
  processed_path: data/processed/features.csv
  date_column: report_date
  target_column: outbreak_next_14d
  region_column: region
  forecast_horizon_days: 14
  schema_mapping:
    date: report_date
    region: region
    hospital_cases: hospital_cases
    social_signal_index: social_signal_index
    weather_risk_index: weather_risk_index
    target: outbreak_next_14d
web:
  regions:
  - amaravathi
  live_search_terms:
  - disease outbreak
  - dengue cases
  - fever cases
  - flu surge
  history_days: 160
  live_search_lookback_days: 3
  request_timeout_seconds: 20
features:
  lag_days:
  - 1
  - 3
  - 7
  rolling_windows:
  - 3
  - 7
  - 14
  base_columns:
  - hospital_cases
  - social_signal_index
  - weather_risk_index
model:
  type: random_forest
  n_estimators: 300
  max_depth: 8
  min_samples_leaf: 5
  class_weight: balanced
  test_size: 0.25
alerts:
  policy: false_alarm_tolerance
  false_alarm_tolerance: 0.15
  minimum_recall: 0.7
  probability_threshold: null
  severity_levels:
    medium: 0.65
    high: 0.8
    critical: 0.9
apis:
  weather:
    base_url: https://api.openweathermap.org/data/2.5/weather
    city: Berlin
    units: metric
  social:
    provider_name: custom_social_provider
    endpoint_url: https://example-social-signal/api/v1/signal
